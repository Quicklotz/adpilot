name: Release Binaries

on:
  release:
    types: [published]

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: node20-macos-x64
            artifact: adpilot-macos-x64
          - os: macos-latest
            target: node20-macos-arm64
            artifact: adpilot-macos-arm64
          - os: ubuntu-latest
            target: node20-linux-x64
            artifact: adpilot-linux-x64
          - os: windows-latest
            target: node20-win-x64
            artifact: adpilot-win-x64.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx pkg dist/index.js --target ${{ matrix.target }} --output ${{ matrix.artifact }} --compress GZip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
